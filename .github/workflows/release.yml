name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release artifacts
        run: |
          chmod +x scripts/build-release.sh scripts/install-release.sh
          ./scripts/build-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/wiflux-*-py3-none-any.whl
            dist/wiflux-*.tar.gz
            dist/release/wiflux-*-linux-installer.tar.gz
            dist/wiflux-*-checksums.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}